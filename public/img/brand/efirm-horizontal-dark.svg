<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 68" fill="none">
  <defs><style>/* Font loaded via CSS */</style></defs>
  <rect width="228" height="68" fill="#520000"/>
  <g transform="scale(0.3091)">
    
  <!-- ═══ PILLAR (drawn first, behind beam) ══════════════════════════════ -->

  <!-- Finial ball at top -->
  <circle cx="140" cy="44" r="7" fill="#FFFFFF"/>
  <!-- Finial neck -->
  <rect x="137" y="51" width="6" height="9" fill="#FFFFFF"/>
  <!-- Top platform (above hub) -->
  <rect x="131" y="59" width="18" height="4" rx="1" fill="#FFFFFF"/>

  <!-- Column neck (below hub) -->
  <rect x="137" y="79" width="6" height="10" fill="#FFFFFF"/>
  <!-- Bottom platform (below hub) -->
  <rect x="131" y="88" width="18" height="4" rx="1" fill="#FFFFFF"/>

  <!-- Upper barrel (curved sides — lathe profile) -->
  <path d="M 133,92 C 127,107 127,127 133,140 L 147,140 C 153,127 153,107 147,92 Z" fill="#FFFFFF"/>

  <!-- Mid waist ring -->
  <rect x="131" y="140" width="18" height="5" rx="1" fill="#FFFFFF"/>

  <!-- Lower barrel -->
  <path d="M 133,145 C 127,156 127,168 133,175 L 147,175 C 153,168 153,156 147,145 Z" fill="#FFFFFF"/>

  <!-- Base collar -->
  <rect x="124" y="175" width="32" height="6" rx="1" fill="#FFFFFF"/>
  <!-- Base disc -->
  <rect x="112" y="181" width="56" height="6" rx="1" fill="#FFFFFF"/>

  <!-- ═══ BEAM ARMS (curved bezier, over pillar) ══════════════════════════ -->

  <!-- Left arm: curves up toward center, narrows toward end ring -->
  <path d="M 126,62 C 102,53 72,54 52,61
           L 52,73 C 72,75 102,76 126,72 Z" fill="#FFFFFF"/>

  <!-- Right arm (mirror) -->
  <path d="M 154,62 C 178,53 208,54 228,61
           L 228,73 C 208,75 178,76 154,72 Z" fill="#FFFFFF"/>

  <!-- ═══ HUB (center pivot, over beam) ══════════════════════════════════ -->
  <circle cx="140" cy="67" r="13" fill="#FFFFFF"/>
  <circle cx="140" cy="67" r="8"  fill="#520000"/>
  <circle cx="140" cy="67" r="4"  fill="#FFFFFF"/>

  <!-- ═══ SCROLL TERMINALS at beam ends ═══════════════════════════════════ -->
  <!-- Left terminal ring -->
  <circle cx="52" cy="67" r="9"  fill="#FFFFFF"/>
  <circle cx="52" cy="67" r="5"  fill="#520000"/>
  <circle cx="52" cy="67" r="2.5" fill="#FFFFFF"/>

  <!-- Right terminal ring -->
  <circle cx="228" cy="67" r="9"  fill="#FFFFFF"/>
  <circle cx="228" cy="67" r="5"  fill="#520000"/>
  <circle cx="228" cy="67" r="2.5" fill="#FFFFFF"/>

  <!-- ═══ CHAINS — 3 per side, fanning out to pan rim ════════════════════ -->
  <!-- Left chains (from ring at x≈52, y=76 → pan at x=52, y=190) -->
  <line x1="46"  y1="76" x2="14"  y2="190" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="52"  y1="76" x2="52"  y2="190" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="58"  y1="76" x2="90"  y2="190" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right chains -->
  <line x1="222" y1="76" x2="190" y2="190" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="228" y1="76" x2="228" y2="190" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="234" y1="76" x2="266" y2="190" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ═══ PANS — wide shallow bowls ═══════════════════════════════════════ -->
  <!-- Left pan (cx=52, rx=44, bottom arc) -->
  <path d="M 8,190 A 44 13 0 0 1 96,190 L 94,197 A 42 11 0 0 0 10,197 Z" fill="#FFFFFF"/>

  <!-- Right pan (cx=228, rx=44) -->
  <path d="M 184,190 A 44 13 0 0 1 272,190 L 270,197 A 42 11 0 0 0 186,197 Z" fill="#FFFFFF"/>

  <!-- ═══ BASE STEPS ════════════════════════════════════════════════════════ -->
  <rect x="100" y="187" width="80"  height="8"  rx="2" fill="#FFFFFF"/>
  <rect x="78"  y="195" width="124" height="8"  rx="2" fill="#FFFFFF"/>
  <rect x="54"  y="203" width="172" height="11" rx="2" fill="#FFFFFF"/>
  </g>
  <text x="99" y="48"
    font-family="'Playfair Display', Georgia, serif"
    font-weight="700" font-size="39" letter-spacing="3"
    fill="#FFFFFF">eFirm</text>
</svg>