<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  
  <!-- ═══ PILLAR ══════════════════════════════════════════════════════════ -->

  <!-- Finial — teardrop top -->
  <ellipse cx="140" cy="42" rx="6" ry="8" fill="#520000"/>
  <!-- Finial neck — fully rounded pill -->
  <rect x="137.5" y="49" width="5" height="10" rx="2.5" fill="#520000"/>
  <!-- Collar ring above hub -->
  <rect x="130" y="58" width="20" height="5" rx="2.5" fill="#520000"/>

  <!-- Pillar neck below hub -->
  <rect x="137.5" y="79" width="5" height="13" rx="2.5" fill="#520000"/>
  <!-- Collar ring below hub -->
  <rect x="130" y="88" width="20" height="5" rx="2.5" fill="#520000"/>

  <!-- Upper barrel — smooth cusped profile -->
  <path d="M 134,92
           C 128,104 126,118 128,132
           C 129,136 131,139 134,140
           L 146,140
           C 149,139 151,136 152,132
           C 154,118 152,104 146,92
           Z" fill="#520000"/>

  <!-- Waist ring -->
  <rect x="130" y="140" width="20" height="6" rx="3" fill="#520000"/>

  <!-- Lower barrel — shorter, elegant taper -->
  <path d="M 134,146
           C 128,155 127,164 131,173
           C 132,175 134,176 136,176
           L 144,176
           C 146,176 148,175 149,173
           C 153,164 152,155 146,146
           Z" fill="#520000"/>

  <!-- Base collar — wide rounded pill -->
  <rect x="122" y="176" width="36" height="7" rx="3.5" fill="#520000"/>
  <!-- Base disc -->
  <rect x="110" y="183" width="60" height="7" rx="3.5" fill="#520000"/>

  <!-- ═══ BEAM ARMS — smooth upward-arching curves ═══════════════════════ -->

  <!-- Left arm -->
  <path d="M 126,61
           C 106,50 80,50 60,59
           C 56,61 53,63 52,66
           L 52,73
           C 53,74 56,75 60,74
           C 80,76 106,76 126,72
           Z" fill="#520000"/>

  <!-- Right arm -->
  <path d="M 154,61
           C 174,50 200,50 220,59
           C 224,61 227,63 228,66
           L 228,73
           C 227,74 224,75 220,74
           C 200,76 174,76 154,72
           Z" fill="#520000"/>

  <!-- ═══ HUB — triple-ring pivot ═════════════════════════════════════════ -->
  <circle cx="140" cy="67" r="14" fill="#520000"/>
  <circle cx="140" cy="67" r="9"  fill="#FFFFFF"/>
  <circle cx="140" cy="67" r="5"  fill="#520000"/>

  <!-- ═══ TERMINAL RINGS at beam ends ═════════════════════════════════════ -->
  <circle cx="52"  cy="67" r="10" fill="#520000"/>
  <circle cx="52"  cy="67" r="6"  fill="#FFFFFF"/>
  <circle cx="52"  cy="67" r="3"  fill="#520000"/>

  <circle cx="228" cy="67" r="10" fill="#520000"/>
  <circle cx="228" cy="67" r="6"  fill="#FFFFFF"/>
  <circle cx="228" cy="67" r="3"  fill="#520000"/>

  <!-- ═══ CHAINS — 3 per side, rounded caps ════════════════════════════════ -->
  <line x1="46"  y1="77" x2="14"  y2="190" stroke="#520000" stroke-width="3" stroke-linecap="round"/>
  <line x1="52"  y1="77" x2="52"  y2="190" stroke="#520000" stroke-width="3" stroke-linecap="round"/>
  <line x1="58"  y1="77" x2="90"  y2="190" stroke="#520000" stroke-width="3" stroke-linecap="round"/>

  <line x1="222" y1="77" x2="190" y2="190" stroke="#520000" stroke-width="3" stroke-linecap="round"/>
  <line x1="228" y1="77" x2="228" y2="190" stroke="#520000" stroke-width="3" stroke-linecap="round"/>
  <line x1="234" y1="77" x2="266" y2="190" stroke="#520000" stroke-width="3" stroke-linecap="round"/>

  <!-- ═══ PANS — deep curved bowls with rounded rim ═════════════════════ -->
  <!-- Left pan: outer arc + inner arc forming a crescent/bowl -->
  <path d="M 8,190 A 44 16 0 0 1 96,190
           C 94,196 90,199 86,199
           A 38 12 0 0 0 14,199
           C 10,199 6,196 8,190 Z" fill="#520000"/>

  <!-- Right pan -->
  <path d="M 184,190 A 44 16 0 0 1 272,190
           C 270,196 266,199 262,199
           A 38 12 0 0 0 190,199
           C 186,199 182,196 184,190 Z" fill="#520000"/>

  <!-- ═══ BASE STEPS — generously rounded ══════════════════════════════════ -->
  <rect x="100" y="190" width="80"  height="9"  rx="4.5" fill="#520000"/>
  <rect x="78"  y="199" width="124" height="9"  rx="4.5" fill="#520000"/>
  <rect x="54"  y="208" width="172" height="11" rx="5.5" fill="#520000"/>
</svg>