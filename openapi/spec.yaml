openapi: '3.0.3'
info:
  title: Code-Job API
  description: >
    Bilingual (Arabic/English) AI-native commercial-contracts workspace API.
    Default locale: Arabic (RTL). All endpoints require authentication
    unless explicitly marked otherwise.
  version: 0.1.0
  contact:
    name: Code-Job Engineering
servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://staging.example.com/api/v1
    description: Staging (Cloudways — URL TBD after D-01)
paths:
  /api/v1/me:
    get:
      summary: Get authenticated user
      description: Returns the authenticated user's profile, current workspace, role, and list of workspaces.
      operationId: getMe
      tags:
        - Auth
      responses:
        '200':
          description: Authenticated user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/workspaces:
    post:
      summary: Create a new workspace
      description: Creates a new workspace and adds the authenticated user as Owner.
      operationId: createWorkspace
      tags:
        - Workspaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: "مكتب المحاماة"
                default_locale:
                  type: string
                  enum: [ar, en]
                  default: ar
              required:
                - name
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Workspace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/contacts:
    get:
      summary: List contacts
      operationId: listContacts
      tags: [Contacts]
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [person, organization] }
        - name: is_client
          in: query
          schema: { type: boolean }
        - name: is_counterparty
          in: query
          schema: { type: boolean }
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Paginated list of contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a contact
      operationId: createContact
      tags: [Contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInput'
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/contacts/{contact_id}:
    get:
      summary: Get a contact
      operationId: getContact
      tags: [Contacts]
      parameters:
        - name: contact_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      responses:
        '200':
          description: Contact data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update a contact
      operationId: updateContact
      tags: [Contacts]
      parameters:
        - name: contact_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInput'
      responses:
        '200':
          description: Contact updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      summary: Delete a contact
      operationId: deleteContact
      tags: [Contacts]
      parameters:
        - name: contact_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      responses:
        '204':
          description: Contact deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/matters:
    get:
      summary: List matters
      operationId: listMatters
      tags: [Matters]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [active, on_hold, closed, archived] }
        - name: practice_area
          in: query
          schema: { type: string }
        - name: client_id
          in: query
          schema: { type: string, format: ulid }
        - name: search
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Paginated list of matters
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Matter'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a matter
      operationId: createMatter
      tags: [Matters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatterInput'
      responses:
        '201':
          description: Matter created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Matter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/matters/{matter_id}:
    get:
      summary: Get a matter
      operationId: getMatter
      tags: [Matters]
      parameters:
        - name: matter_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      responses:
        '200':
          description: Matter data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Matter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update a matter
      operationId: updateMatter
      tags: [Matters]
      parameters:
        - name: matter_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatterInput'
      responses:
        '200':
          description: Matter updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Matter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      summary: Delete a matter
      operationId: deleteMatter
      tags: [Matters]
      parameters:
        - name: matter_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      responses:
        '204':
          description: Matter deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/matters/{matter_id}/counterparties:
    post:
      summary: Attach counterparty to matter
      operationId: attachCounterparty
      tags: [Matters]
      parameters:
        - name: matter_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact_id: { type: string, format: ulid }
                representing: { type: string, enum: [we_represent, they_represent, no_counsel] }
              required: [contact_id]
      responses:
        '201':
          description: Counterparty attached
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/matters/{matter_id}/counterparties/{contact_id}:
    delete:
      summary: Detach counterparty from matter
      operationId: detachCounterparty
      tags: [Matters]
      parameters:
        - name: matter_id
          in: path
          required: true
          schema: { type: string, format: ulid }
        - name: contact_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      responses:
        '204':
          description: Counterparty detached
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/matters/{matter_id}/lawyers:
    post:
      summary: Attach lawyer to matter
      operationId: attachLawyer
      tags: [Matters]
      parameters:
        - name: matter_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string, format: ulid }
                role: { type: string, maxLength: 50 }
              required: [user_id]
      responses:
        '201':
          description: Lawyer attached
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/matters/{matter_id}/lawyers/{user_id}:
    delete:
      summary: Detach lawyer from matter
      operationId: detachLawyer
      tags: [Matters]
      parameters:
        - name: matter_id
          in: path
          required: true
          schema: { type: string, format: ulid }
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: ulid }
      responses:
        '204':
          description: Lawyer detached
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/workspaces/switch:
    post:
      summary: Switch current workspace
      description: Switches the authenticated user's current workspace context.
      operationId: switchWorkspace
      tags:
        - Workspaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                workspace_id:
                  type: string
                  format: ulid
              required:
                - workspace_id
      responses:
        '200':
          description: Workspace switched
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Workspace'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    User:
      type: object
      properties:
        id:
          type: string
          format: ulid
        name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          format: uri
          nullable: true
        preferred_locale:
          type: string
          enum: [ar, en]
        current_workspace:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Workspace'
        current_role:
          type: string
          enum: [owner, admin, member]
          nullable: true
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - preferred_locale
    Workspace:
      type: object
      properties:
        id:
          type: string
          format: ulid
        name:
          type: string
        slug:
          type: string
        default_locale:
          type: string
          enum: [ar, en]
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - default_locale
    Contact:
      type: object
      properties:
        id: { type: string, format: ulid }
        type: { type: string, enum: [person, organization] }
        first_name: { type: string, nullable: true }
        middle_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        organization_name: { type: string, nullable: true }
        display_name: { type: string }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        nationality: { type: string, nullable: true }
        tax_registration_number: { type: string, nullable: true }
        address_line_1: { type: string, nullable: true }
        address_line_2: { type: string, nullable: true }
        city: { type: string, nullable: true }
        country: { type: string, nullable: true }
        is_client: { type: boolean }
        is_counterparty: { type: boolean }
        notes: { type: string, nullable: true }
        labels: { type: array, items: { type: string }, nullable: true }
        parent_organization_id: { type: string, format: ulid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, type, display_name, is_client, is_counterparty]
    ContactInput:
      type: object
      properties:
        type: { type: string, enum: [person, organization] }
        first_name: { type: string }
        middle_name: { type: string }
        last_name: { type: string }
        organization_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        nationality: { type: string }
        tax_registration_number: { type: string }
        address_line_1: { type: string }
        address_line_2: { type: string }
        city: { type: string }
        country: { type: string }
        is_client: { type: boolean }
        is_counterparty: { type: boolean }
        notes: { type: string }
        labels: { type: array, items: { type: string } }
        parent_organization_id: { type: string, format: ulid }
      required: [type]
    Matter:
      type: object
      properties:
        id: { type: string, format: ulid }
        title: { type: string }
        client_id: { type: string, format: ulid }
        practice_area: { type: string, enum: [commercial_contracts, ma, corporate_governance, securities, general_counsel, other] }
        status: { type: string, enum: [active, on_hold, closed, archived] }
        stage: { type: string, nullable: true }
        description: { type: string, nullable: true }
        internal_reference: { type: string, nullable: true }
        lead_lawyer_id: { type: string, format: ulid, nullable: true }
        opened_at: { type: string, format: date, nullable: true }
        closed_at: { type: string, format: date, nullable: true }
        tags: { type: array, items: { type: string }, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, title, client_id, practice_area, status]
    MatterInput:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        client_id: { type: string, format: ulid }
        practice_area: { type: string, enum: [commercial_contracts, ma, corporate_governance, securities, general_counsel, other] }
        status: { type: string, enum: [active, on_hold, closed, archived] }
        stage: { type: string }
        description: { type: string }
        internal_reference: { type: string }
        lead_lawyer_id: { type: string, format: ulid }
        opened_at: { type: string, format: date }
        closed_at: { type: string, format: date }
        tags: { type: array, items: { type: string } }
      required: [title, client_id, practice_area]
security:
  - bearerAuth: []
